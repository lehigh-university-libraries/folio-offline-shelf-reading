name: deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod
jobs:
  run:
    uses: lehigh-university-libraries/gha/.github/workflows/linderman-deploy.yaml@c8210d733114d47b7cbb55cefe87466f60b811a5 # main
    with:
      url: https://apps-${{ inputs.environment }}.lib.lehigh.edu/_rollout
    permissions:
      contents: read
      id-token: write
